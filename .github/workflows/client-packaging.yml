name: Client Packaging

env:
  # Prefer Node.js 24 for JavaScript actions ahead of platform default switch
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_call:
    inputs:
      build_android:
        required: false
        type: string
        default: 'false'
      release_label:
        required: false
        type: string
        default: ''
      deb_version:
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Also build Android APK lane (requires Android SDK on runner)'
        required: false
        default: 'false'
      release_label:
        description: 'Override version label for packaging outputs (optional)'
        required: false
        default: ''
      deb_version:
        description: 'Override Debian package version (optional)'
        required: false
        default: ''
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - 'packaging/**'
      - 'scripts/build-client-linux-package.sh'
      - 'scripts/build-client-linux-bundle-tar.sh'
      - 'scripts/read-client-release-metadata.sh'
      - 'scripts/override-client-release-metadata.py'
      - 'scripts/package-client-windows-zip.sh'
      - 'scripts/package-client-macos-app-zip.sh'
      - 'scripts/collect-client-android-apk.sh'
      - 'scripts/client_packaged_smoke.py'
      - 'scripts/validate_client_release_truth.py'
      - '.github/workflows/client-packaging.yml'

jobs:
  linux-client-package:
    name: Linux client package (.deb + tar.gz)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libsecret-1-dev \
            lld \
            zip

      - name: Ensure Linux scaffolding exists
        run: |
          if [ ! -d client/linux ]; then
            (cd client && flutter create . --platforms=linux)
          fi

      - name: Export release metadata
        id: meta
        run: |
          chmod +x scripts/read-client-release-metadata.sh
          scripts/read-client-release-metadata.sh --github-output

      - name: Override release metadata from workflow input
        if: inputs.release_label != '' || inputs.deb_version != ''
        env:
          RELEASE_LABEL_INPUT: ${{ inputs.release_label }}
          DEB_VERSION_INPUT: ${{ inputs.deb_version }}
        run: |
          chmod +x scripts/override-client-release-metadata.py
          scripts/override-client-release-metadata.py packaging/linux/release-metadata.env
          scripts/read-client-release-metadata.sh --github-output

      - name: Flutter analyze
        working-directory: client
        run: |
          flutter pub get
          flutter analyze

      - name: Flutter test gate (domain/application)
        working-directory: client
        run: |
          flutter test \
            test/features/controller/application/adapter_backed_client_controller_test.dart \
            test/features/controller/application/real_shell_controller_adapter_test.dart \
            test/features/diagnostics/application/diagnostics_export_service_test.dart \
            test/features/settings/application/settings_serialization_test.dart \
            test/features/packaging/application/packaging_store_test.dart \
            test/features/packaging/presentation/packaging_page_test.dart

      - name: Dataplane runtime-truth gate
        working-directory: client
        run: |
          flutter test \
            test/features/routing/testing/domain/routing_probe_runtime_posture_test.dart \
            test/features/routing/testing/platform/routing_probe_adapter_runtime_posture_test.dart \
            test/features/routing/testing/application/routing_probe_runner_runtime_truth_gate_test.dart \
            test/features/diagnostics/application/diagnostics_export_routing_runtime_posture_test.dart

      - name: Build Linux bundle
        working-directory: client
        run: flutter build linux --release

      - name: Build Debian package
        run: |
          chmod +x scripts/build-client-linux-package.sh
          scripts/build-client-linux-package.sh

      - name: Build Linux tar.gz bundle
        run: |
          chmod +x scripts/build-client-linux-bundle-tar.sh
          scripts/build-client-linux-bundle-tar.sh

      - name: Validate release truth
        run: |
          python3 scripts/validate_client_release_truth.py

      - name: Packaged smoke (Linux bundle)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libegl1
          python3 scripts/client_packaged_smoke.py \
            --platform linux \
            --artifact-root packaging/linux/artifacts/${{ steps.meta.outputs.release_dir_name }} \
            --mode smoke

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: client-linux-${{ steps.meta.outputs.version_label }}
          path: |
            packaging/linux/artifacts/${{ steps.meta.outputs.release_dir_name }}/*.deb
            packaging/linux/artifacts/${{ steps.meta.outputs.release_dir_name }}/*.deb.sha256
            packaging/linux/artifacts/${{ steps.meta.outputs.release_dir_name }}/*.tar.gz
            packaging/linux/artifacts/${{ steps.meta.outputs.release_dir_name }}/*.tar.gz.sha256

  windows-client-package:
    name: Windows client package (.zip)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Ensure Windows scaffolding exists
        shell: bash
        run: |
          if [ ! -d client/windows ]; then
            (cd client && flutter create . --platforms=windows)
          fi

      - name: Export release metadata
        id: meta
        shell: bash
        run: |
          chmod +x scripts/read-client-release-metadata.sh
          scripts/read-client-release-metadata.sh --github-output

      - name: Override release metadata from workflow input
        if: inputs.release_label != '' || inputs.deb_version != ''
        shell: bash
        env:
          RELEASE_LABEL_INPUT: ${{ inputs.release_label }}
          DEB_VERSION_INPUT: ${{ inputs.deb_version }}
        run: |
          chmod +x scripts/override-client-release-metadata.py
          scripts/override-client-release-metadata.py packaging/linux/release-metadata.env
          scripts/read-client-release-metadata.sh --github-output

      - name: Flutter analyze
        working-directory: client
        shell: bash
        run: |
          flutter pub get
          flutter analyze

      - name: Build Windows release bundle
        working-directory: client
        shell: bash
        run: flutter build windows --release

      - name: Package Windows zip
        shell: bash
        run: |
          chmod +x scripts/package-client-windows-zip.sh
          scripts/package-client-windows-zip.sh

      - name: Validate release truth
        shell: bash
        run: |
          python scripts/validate_client_release_truth.py

      - name: Packaged smoke (Windows zip)
        shell: bash
        run: |
          python scripts/client_packaged_smoke.py \
            --platform windows \
            --artifact-root packaging/windows/artifacts/${{ steps.meta.outputs.release_dir_name }} \
            --mode smoke

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: client-windows-${{ steps.meta.outputs.version_label }}
          path: |
            packaging/windows/artifacts/${{ steps.meta.outputs.release_dir_name }}/*.zip
            packaging/windows/artifacts/${{ steps.meta.outputs.release_dir_name }}/*.zip.sha256

  macos-client-package:
    name: macOS client package (.app zip)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Ensure macOS scaffolding exists
        run: |
          if [ ! -d client/macos ]; then
            (cd client && flutter create . --platforms=macos)
          fi

      - name: Export release metadata
        id: meta
        run: |
          chmod +x scripts/read-client-release-metadata.sh
          scripts/read-client-release-metadata.sh --github-output

      - name: Override release metadata from workflow input
        if: inputs.release_label != '' || inputs.deb_version != ''
        env:
          RELEASE_LABEL_INPUT: ${{ inputs.release_label }}
          DEB_VERSION_INPUT: ${{ inputs.deb_version }}
        run: |
          chmod +x scripts/override-client-release-metadata.py
          scripts/override-client-release-metadata.py packaging/linux/release-metadata.env
          scripts/read-client-release-metadata.sh --github-output

      - name: Flutter analyze
        working-directory: client
        run: |
          flutter pub get
          flutter analyze

      - name: Build macOS app
        working-directory: client
        run: flutter build macos

      - name: Package macOS app zip
        run: |
          chmod +x scripts/package-client-macos-app-zip.sh
          scripts/package-client-macos-app-zip.sh

      - name: Validate release truth
        run: |
          python3 scripts/validate_client_release_truth.py

      - name: Packaged smoke (macOS app zip)
        run: |
          python3 scripts/client_packaged_smoke.py \
            --platform macos \
            --artifact-root packaging/macos/artifacts/${{ steps.meta.outputs.release_dir_name }} \
            --mode smoke

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: client-macos-${{ steps.meta.outputs.version_label }}
          path: |
            packaging/macos/artifacts/${{ steps.meta.outputs.release_dir_name }}/*.zip
            packaging/macos/artifacts/${{ steps.meta.outputs.release_dir_name }}/*.zip.sha256

  android-client-package:
    name: Android client package (.apk)
    if: inputs.build_android == 'true'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Ensure Android scaffolding exists
        run: |
          if [ ! -d client/android ]; then
            (cd client && flutter create . --platforms=android)
          fi

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Export release metadata
        id: meta
        run: |
          chmod +x scripts/read-client-release-metadata.sh
          scripts/read-client-release-metadata.sh --github-output

      - name: Override release metadata from workflow input
        if: inputs.release_label != '' || inputs.deb_version != ''
        env:
          RELEASE_LABEL_INPUT: ${{ inputs.release_label }}
          DEB_VERSION_INPUT: ${{ inputs.deb_version }}
        run: |
          chmod +x scripts/override-client-release-metadata.py
          scripts/override-client-release-metadata.py packaging/linux/release-metadata.env
          scripts/read-client-release-metadata.sh --github-output

      - name: Flutter analyze
        working-directory: client
        run: |
          flutter pub get
          flutter analyze

      - name: Build Android APK
        working-directory: client
        run: flutter build apk --release

      - name: Collect APK artifact
        run: |
          chmod +x scripts/collect-client-android-apk.sh
          scripts/collect-client-android-apk.sh

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: client-android-${{ steps.meta.outputs.version_label }}
          path: |
            packaging/android/artifacts/${{ steps.meta.outputs.release_dir_name }}/*.apk
            packaging/android/artifacts/${{ steps.meta.outputs.release_dir_name }}/*.apk.sha256
