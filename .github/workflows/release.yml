name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release'
        required: false
        default: 'nightly'

env:
  BUILD_TYPE: Release

jobs:
  # ============================================
  # Linux Builds (x86_64 and aarch64)
  # ============================================
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm64

    runs-on: ${{ matrix.runner }}
    name: Linux ${{ matrix.arch }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libboost-system-dev \
            libboost-program-options-dev \
            libssl-dev

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DENABLE_MYSQL=OFF
          make -j$(nproc)

      - name: Strip binary
        run: strip build/trojan

      - name: Get version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(git describe --tags --always --dirty)" >> $GITHUB_OUTPUT
          fi

      - name: Package artifact
        run: |
          mkdir -p dist
          cp build/trojan dist/trojan-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}
          cp config.json dist/ 2>/dev/null || echo "No config.json to copy"
          cd dist
          tar -czvf trojan-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}.tar.gz \
            trojan-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}
          sha256sum trojan-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}.tar.gz > \
            trojan-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  # ============================================
  # macOS Builds (x86_64 and arm64 Universal)
  # ============================================
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-15
            cmake_osx_arch: x86_64
          - arch: arm64
            runner: macos-15
            cmake_osx_arch: arm64

    runs-on: ${{ matrix.runner }}
    name: macOS ${{ matrix.arch }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          # Unlink existing boost if present, then install fresh
          brew unlink boost 2>/dev/null || true
          brew install boost openssl@3
          # Force link boost
          brew link --overwrite boost 2>/dev/null || true

      - name: Build
        run: |
          BOOST_ROOT=$(brew --prefix boost)
          OPENSSL_ROOT=$(brew --prefix openssl@3)
          
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_osx_arch }} \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBOOST_ROOT=$BOOST_ROOT \
            -DBoost_INCLUDE_DIR=$BOOST_ROOT/include \
            -DBoost_LIBRARY_DIR=$BOOST_ROOT/lib \
            -DOPENSSL_ROOT_DIR=$OPENSSL_ROOT \
            -DENABLE_MYSQL=OFF
          make -j$(sysctl -n hw.ncpu)

      - name: Strip binary
        run: strip build/trojan

      - name: Get version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(git describe --tags --always --dirty)" >> $GITHUB_OUTPUT
          fi

      - name: Package artifact
        run: |
          mkdir -p dist
          cp build/trojan dist/trojan-${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}
          cd dist
          tar -czvf trojan-${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}.tar.gz \
            trojan-${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}
          shasum -a 256 trojan-${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}.tar.gz > \
            trojan-${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  # ============================================
  # Windows Build (x86_64 via MSYS2/MinGW)
  # ============================================
  build-windows:
    runs-on: windows-latest
    name: Windows x86_64

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl
            make
            zip

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. \
            -G "MSYS Makefiles" \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DENABLE_MYSQL=OFF
          make -j$(nproc)

      - name: Strip binary
        run: strip build/trojan.exe

      - name: Get version
        id: version
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "version=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
          else
            echo "version=$(git describe --tags --always --dirty)" >> $GITHUB_OUTPUT
          fi

      - name: Package artifact
        run: |
          mkdir -p dist
          cp build/trojan.exe dist/trojan-${{ steps.version.outputs.version }}-windows-x86_64.exe
          cd dist
          zip trojan-${{ steps.version.outputs.version }}-windows-x86_64.zip \
            trojan-${{ steps.version.outputs.version }}-windows-x86_64.exe
          sha256sum trojan-${{ steps.version.outputs.version }}-windows-x86_64.zip > \
            trojan-${{ steps.version.outputs.version }}-windows-x86_64.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            dist/*.zip
            dist/*.sha256

  # ============================================
  # Create GitHub Release
  # ============================================
  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f -ls

      - name: Generate release notes
        id: release_notes
        run: |
          cat << 'EOF' > release_notes.md
          ## Trojan-Pro ${{ github.ref_name }}

          ### Downloads

          | Platform | Architecture | Download |
          |----------|--------------|----------|
          | Linux | x86_64 | `trojan-${{ github.ref_name }}-linux-x86_64.tar.gz` |
          | Linux | aarch64 | `trojan-${{ github.ref_name }}-linux-aarch64.tar.gz` |
          | macOS | x86_64 (Intel) | `trojan-${{ github.ref_name }}-macos-x86_64.tar.gz` |
          | macOS | arm64 (Apple Silicon) | `trojan-${{ github.ref_name }}-macos-arm64.tar.gz` |
          | Windows | x86_64 | `trojan-${{ github.ref_name }}-windows-x86_64.zip` |

          ### Verification

          Each download includes a `.sha256` checksum file. Verify integrity:

          ```bash
          # Linux/macOS
          sha256sum -c trojan-${{ github.ref_name }}-linux-x86_64.tar.gz.sha256

          # macOS alternative
          shasum -a 256 -c trojan-${{ github.ref_name }}-macos-arm64.tar.gz.sha256
          ```

          ### Quick Start

          ```bash
          # Extract
          tar -xzf trojan-${{ github.ref_name }}-linux-x86_64.tar.gz

          # Run
          ./trojan-${{ github.ref_name }}-linux-x86_64 -c config.json
          ```

          ### Changelog

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Trojan-Pro ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
