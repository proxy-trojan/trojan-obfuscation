name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release (used for manual run labeling only)'
        required: false
        default: 'nightly'
      build_android_client:
        description: 'Also build Android client APK lane'
        required: false
        default: 'false'

env:
  BUILD_TYPE: Release
  # Prefer Node.js 24 for JavaScript actions ahead of platform default switch
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================
  # Release policy guard
  # ============================================
  release-policy-guard:
    name: Release policy guard (block prerelease tags)
    runs-on: ubuntu-latest

    steps:
      - name: Enforce no prerelease tags (alpha/beta/rc)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          echo "release policy: validating tag '${TAG_NAME}'"

          # Policy: we are fully stopping prerelease cuts.
          # Block alpha/beta/rc tags explicitly.
          if echo "${TAG_NAME}" | grep -Eiq '(alpha|beta|rc)'; then
            echo "ERROR: prerelease tags are blocked by policy (found alpha/beta/rc in '${TAG_NAME}')."
            echo "If you intended a stable release, use a stable tag like: v1.5.0"
            exit 1
          fi

          echo "OK: stable tag detected."

  # ============================================
  # tp CLI bootstrap artifacts (Linux amd64/arm64)
  # ============================================
  build-tp-linux:
    needs: [release-policy-guard]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-22.04
            arch: x86_64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            arch: aarch64

    runs-on: ${{ matrix.runner }}
    name: tp ${{ matrix.target }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Python packaging toolchain
        run: |
          set -euo pipefail
          sudo apt-get update
          # NOTE: On Ubuntu runners, `python3 -m ensurepip` is disabled for the system Python.
          # Install pip via apt and keep tooling isolated in a venv.
          sudo apt-get install -y python3 python3-venv python3-pip

          python3 -m venv .venv
          . .venv/bin/activate

          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build tp single-binary
        run: |
          set -euo pipefail
          . .venv/bin/activate

          mkdir -p dist
          pyinstaller -F \
            -n tp \
            scripts/install/runtime/cli.py
          cp dist/tp "dist/tp-${{ matrix.target }}"

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum "tp-${{ matrix.target }}" > "tp-${{ matrix.target }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tp-${{ matrix.target }}
          path: |
            dist/tp-${{ matrix.target }}
            dist/tp-${{ matrix.target }}.sha256

  # ============================================
  # Linux Builds (x86_64 and aarch64)
  # ============================================
  build-linux:
    needs: [release-policy-guard]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Use Ubuntu 20.04 for x86_64 for better glibc compatibility (glibc 2.31)
          - arch: x86_64
            runner: ubuntu-22.04
          # Use Ubuntu 22.04 for aarch64 (oldest available ARM runner, glibc 2.35)
          - arch: aarch64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    name: Linux ${{ matrix.arch }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libboost-system-dev \
            libboost-program-options-dev \
            libssl-dev \
            python3 \
            openssl

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBOOST_USE_STATIC_LIBS=ON \
            -DENABLE_MYSQL=OFF \
            -DENABLE_SSL_KEYLOG=OFF
          make -j$(nproc)
          ctest --output-on-failure -j2

      - name: Verify static linking
        run: |
          echo "=== Binary dependencies ==="
          ldd build/trojan || true
          echo ""
          echo "=== Checking for Boost dependencies (should be none) ==="
          ldd build/trojan 2>/dev/null | grep -i boost && echo "WARNING: Dynamic Boost found!" || echo "OK: No dynamic Boost dependencies"
          echo ""
          echo "=== GLIBC version requirements ==="
          objdump -T build/trojan | grep GLIBC | sed 's/.*GLIBC_/GLIBC_/g' | cut -d')' -f1 | sort -V | uniq
          echo ""
          echo "=== Build system glibc version ==="
          ldd --version | head -1

      - name: Strip binary
        run: strip build/trojan

      - name: Get version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="$(git describe --tags --always --dirty 2>/dev/null || true)"
            if [ -z "$VERSION" ]; then
              VERSION="${GITHUB_SHA::7}"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package artifact
        run: |
          mkdir -p dist
          cp build/trojan dist/trojan-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}
          cp config.json dist/ 2>/dev/null || echo "No config.json to copy"
          cd dist
          tar -czvf trojan-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}.tar.gz \
            trojan-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}
          sha256sum trojan-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}.tar.gz > \
            trojan-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  # ============================================
  # macOS Builds (x86_64 and arm64)
  # ============================================
  build-macos:
    needs: [release-policy-guard]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-15
            arch_flag: -x86_64
            b2_arch: x86
          - arch: arm64
            runner: macos-15
            arch_flag: -arm64
            b2_arch: arm

    runs-on: ${{ matrix.runner }}
    name: macOS ${{ matrix.arch }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install x86_64 OpenSSL
        if: matrix.arch == 'x86_64'
        run: |
          softwareupdate --install-rosetta --agree-to-license || true
          if [ ! -x /usr/local/bin/brew ]; then
            NONINTERACTIVE=1 arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          arch -x86_64 /usr/local/bin/brew install openssl@3

      - name: Install arm64 OpenSSL
        if: matrix.arch == 'arm64'
        run: |
          brew install openssl@3

      - name: Build Boost from source
        run: |
          # Download Boost
          curl -L -o boost.tar.bz2 "https://archives.boost.io/release/1.84.0/source/boost_1_84_0.tar.bz2"
          tar -xjf boost.tar.bz2
          cd boost_1_84_0
          
          # Bootstrap
          ./bootstrap.sh --with-libraries=system,program_options --prefix=$HOME/boost-install
          
          # Build for target architecture
          ./b2 architecture=${{ matrix.b2_arch }} address-model=64 link=static threading=multi variant=release install -j$(sysctl -n hw.ncpu)

      - name: Build
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            OPENSSL_ROOT="/usr/local/opt/openssl@3"
          else
            OPENSSL_ROOT="$(brew --prefix openssl@3)"
          fi

          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DBOOST_ROOT=$HOME/boost-install \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DBOOST_USE_STATIC_LIBS=ON \
            -DOPENSSL_ROOT_DIR=$OPENSSL_ROOT \
            -DOPENSSL_INCLUDE_DIR=$OPENSSL_ROOT/include \
            -DOPENSSL_SSL_LIBRARY=$OPENSSL_ROOT/lib/libssl.dylib \
            -DOPENSSL_CRYPTO_LIBRARY=$OPENSSL_ROOT/lib/libcrypto.dylib \
            -DENABLE_MYSQL=OFF \
            -DENABLE_SSL_KEYLOG=OFF \
            -Wno-dev
          make -j$(sysctl -n hw.ncpu)
          ctest --output-on-failure -j2

      - name: Strip binary
        run: strip build/trojan

      - name: Get version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package artifact
        run: |
          mkdir -p dist
          cp build/trojan dist/trojan-${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}
          cd dist
          tar -czvf trojan-${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}.tar.gz \
            trojan-${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}
          shasum -a 256 trojan-${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}.tar.gz > \
            trojan-${{ steps.version.outputs.version }}-macos-${{ matrix.arch }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  # ============================================
  # Windows Build (x86_64 via MSYS2/MinGW)
  # ============================================
  build-windows:
    needs: [release-policy-guard]
    runs-on: windows-latest
    name: Windows x86_64

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-python
            make
            zip

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. \
            -G "MSYS Makefiles" \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DBOOST_USE_STATIC_LIBS=ON \
            -DENABLE_MYSQL=OFF \
            -DENABLE_SSL_KEYLOG=OFF
          make -j$(nproc)
          ctest --output-on-failure -j2

      - name: Strip binary
        run: strip build/trojan.exe

      - name: Get version
        id: version
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="$GITHUB_REF_NAME"
          else
            VERSION="$(git describe --tags --always --dirty 2>/dev/null || true)"
            if [ -z "$VERSION" ]; then
              VERSION="${GITHUB_SHA:0:7}"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package artifact
        run: |
          mkdir -p dist
          cp build/trojan.exe dist/trojan-${{ steps.version.outputs.version }}-windows-x86_64.exe
          cd dist
          zip trojan-${{ steps.version.outputs.version }}-windows-x86_64.zip \
            trojan-${{ steps.version.outputs.version }}-windows-x86_64.exe
          sha256sum trojan-${{ steps.version.outputs.version }}-windows-x86_64.zip > \
            trojan-${{ steps.version.outputs.version }}-windows-x86_64.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-x86_64
          path: |
            dist/*.zip
            dist/*.sha256

  # ============================================
  # Client Packaging (multi-platform client artifacts)
  # ============================================
  client-packaging:
    name: Client packaging (Linux/Windows/macOS + optional Android)
    uses: ./.github/workflows/client-packaging.yml
    with:
      build_android: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) && 'true' || (github.event_name == 'workflow_dispatch' && inputs.build_android_client == 'true' && 'true' || 'false') }}

  # ============================================
  # Artifact Validation (workflow_dispatch)
  # ============================================
  validate-artifacts:
    name: Validate artifacts (core + client)
    runs-on: ubuntu-22.04
    needs: [build-tp-linux, build-linux, build-macos, build-windows, client-packaging]
    if: always() && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')))

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip dpkg

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f | sort

      - name: Verify checksum files
        run: |
          chmod +x scripts/verify-artifact-checksums.sh
          scripts/verify-artifact-checksums.sh artifacts

      - name: Validate expected artifacts and publish summary
        env:
          EXPECT_ANDROID: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) && 'true' || (github.event_name == 'workflow_dispatch' && inputs.build_android_client == 'true' && 'true' || 'false') }}
        run: |
          cd artifacts

          check_present() {
            local pattern="$1"
            compgen -G "$pattern" > /dev/null
          }

          CORE_OK=true
          CLIENT_OK=true
          SANITY_OK=true

          {
            echo "## Build Validation Summary"
            echo "- workflow: Build and Release (manual dispatch)"
            echo "- android client lane: $EXPECT_ANDROID"
            echo
            echo "### Core artifacts"
            for pattern in \
              'trojan-*-linux-x86_64.tar.gz' \
              'trojan-*-linux-aarch64.tar.gz' \
              'trojan-*-macos-x86_64.tar.gz' \
              'trojan-*-macos-arm64.tar.gz' \
              'trojan-*-windows-x86_64.zip'; do
              if check_present "$pattern"; then
                echo "- ✅ $pattern"
              else
                echo "- ❌ $pattern"
                CORE_OK=false
              fi
            done
            echo
            echo "### Client artifacts"
            for pattern in \
              'trojan-pro-client_*_amd64.deb' \
              'trojan-pro-client_*_linux-x64-bundle.tar.gz' \
              'trojan-pro-client_*_windows-x64.zip' \
              'trojan-pro-client_*_macos-app.zip'; do
              if check_present "$pattern"; then
                echo "- ✅ $pattern"
              else
                echo "- ❌ $pattern"
                CLIENT_OK=false
              fi
            done
            if [ "$EXPECT_ANDROID" = "true" ]; then
              if check_present 'trojan-pro-client_*_android-release.apk'; then
                echo "- ✅ trojan-pro-client_*_android-release.apk"
              else
                echo "- ❌ trojan-pro-client_*_android-release.apk"
                CLIENT_OK=false
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          chmod +x ../scripts/smoke-check-client-artifacts.sh
          if ../scripts/smoke-check-client-artifacts.sh . --platforms linux,windows,macos $( [ "$EXPECT_ANDROID" = "true" ] && echo --expect-android || echo --no-expect-android ); then
            SANITY_OK=true
          else
            SANITY_OK=false
          fi

          {
            echo
            echo "### Validation status"
            echo "- checksum verification: passed"
            echo "- core artifacts complete: $CORE_OK"
            echo "- client artifacts complete: $CLIENT_OK"
            echo "- package sanity checks: $SANITY_OK"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$CORE_OK" != true ] || [ "$CLIENT_OK" != true ] || [ "$SANITY_OK" != true ]; then
            exit 1
          fi

  # ============================================
  # Create GitHub Release
  # ============================================
  release:
    needs: [build-tp-linux, build-linux, build-macos, build-windows, client-packaging, validate-artifacts]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f -ls

      - name: Generate release notes
        id: release_notes
        run: |
          cat << 'EOF' > release_notes.md
          ## Trojan-Pro ${{ github.ref_name }}

          ### Release Summary / 发布摘要

          **EN**
          - Formal tagged release generated from validated multi-platform CI pipeline.
          - Includes core binaries + desktop client packages + Android APK.

          **中文**
          - 基于已验证的多平台 CI 流程生成的正式 tag 发行版。
          - 同时包含 core 二进制、桌面 client 包与 Android APK。

          ### Core Downloads

          | Platform | Architecture | Artifact |
          |----------|--------------|----------|
          | Linux | x86_64 | `trojan-${{ github.ref_name }}-linux-x86_64.tar.gz` |
          | Linux | aarch64 | `trojan-${{ github.ref_name }}-linux-aarch64.tar.gz` |
          | macOS | x86_64 (Intel) | `trojan-${{ github.ref_name }}-macos-x86_64.tar.gz` |
          | macOS | arm64 (Apple Silicon) | `trojan-${{ github.ref_name }}-macos-arm64.tar.gz` |
          | Windows | x86_64 | `trojan-${{ github.ref_name }}-windows-x86_64.zip` |

          ### Client Downloads

          | Platform | Artifact |
          |----------|----------|
          | Linux | `trojan-pro-client_*_amd64.deb` |
          | Linux | `trojan-pro-client_*_linux-x64-bundle.tar.gz` |
          | Windows | `trojan-pro-client_*_windows-x64.zip` |
          | macOS | `trojan-pro-client_*_macos-app.zip` |
          | Android | `trojan-pro-client_*_android-release.apk` |

          ### Verification

          Every packaged artifact includes a `.sha256` checksum file.

          ```bash
          # Linux/macOS
          sha256sum -c <artifact>.sha256

          # macOS alternative
          shasum -a 256 -c <artifact>.sha256
          ```

          ### Changelog

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md).
          EOF

      - name: Prepare guided quick-install assets
        run: |
          set -euo pipefail
          cp scripts/release/tp-install.sh artifacts/tp-install.sh
          sha256sum artifacts/tp-install.sh > artifacts/tp-install.sh.sha256

          # tp artifacts are already produced with the exact release asset names
          # expected by tp-install.sh (tp-linux-amd64/arm64 + .sha256). Assert they exist.
          test -f artifacts/tp-linux-amd64
          test -f artifacts/tp-linux-amd64.sha256
          test -f artifacts/tp-linux-arm64
          test -f artifacts/tp-linux-arm64.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Trojan-Pro ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.deb
            artifacts/*.apk
            artifacts/*.sha256
            artifacts/tp-linux-amd64
            artifacts/tp-linux-arm64
            artifacts/tp-install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
