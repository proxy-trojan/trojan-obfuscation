name: CI Smoke

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  smoke-linux:
    runs-on: ubuntu-22.04
    name: Linux smoke test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libboost-system-dev \
            libboost-program-options-dev \
            libssl-dev \
            openssl \
            python3

      - name: Configure
        run: |
          cmake -S . -B build/ci \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_MYSQL=OFF \
            -DENABLE_SSL_KEYLOG=OFF

      - name: Build
        run: |
          cmake --build build/ci -j"$(nproc)"

      - name: Run smoke tests
        run: |
          ctest --test-dir build/ci --output-on-failure -j"$(nproc)"

      - name: Iter-3 truthful daily-use validation bundle
        run: |
          ./scripts/validate_iter3_truthful_daily_use.sh

  flutter-client-gate:
    runs-on: ubuntu-22.04
    name: Flutter client gate (domain/application)

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Flutter analyze + targeted tests
        working-directory: client
        run: |
          flutter pub get
          flutter analyze
          flutter test \
            test/features/controller/application/adapter_backed_client_controller_test.dart \
            test/features/controller/application/real_shell_controller_adapter_test.dart \
            test/features/diagnostics/application/diagnostics_export_service_test.dart \
            test/features/settings/application/settings_serialization_test.dart \
            test/features/packaging/application/packaging_store_test.dart \
            test/features/packaging/presentation/packaging_page_test.dart

      - name: Routing safety and dataplane evidence gate
        working-directory: client
        run: |
          flutter test \
            test/features/routing/testing/domain/routing_probe_models_test.dart \
            test/features/routing/testing/domain/routing_probe_runtime_posture_test.dart \
            test/features/routing/testing/application/routing_probe_verdict_service_test.dart \
            test/features/routing/testing/application/routing_probe_runner_test.dart \
            test/features/routing/testing/application/routing_probe_runner_runtime_truth_gate_test.dart \
            test/features/routing/testing/platform/routing_probe_adapter_linux_test.dart \
            test/features/routing/testing/platform/routing_probe_adapter_runtime_posture_test.dart \
            test/features/diagnostics/application/diagnostics_export_routing_evidence_test.dart \
            test/features/diagnostics/application/diagnostics_export_routing_runtime_posture_test.dart \
            test/features/routing/application/routing_guardrail_service_test.dart \
            test/features/routing/application/routing_dry_run_service_test.dart \
            test/features/routing/domain/routing_runtime_safety_test.dart \
            test/features/controller/application/adapter_backed_client_controller_test.dart \
            test/features/diagnostics/application/diagnostics_export_routing_recovery_test.dart
